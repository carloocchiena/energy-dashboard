<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Dashboard | Quote Monitor</title>
    <style>
        body { background-color: #0d1117; margin: 0; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .container { max-width: 1000px; margin: auto; }
        h1 { color: #58a6ff; font-weight: 400; text-align: center; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Global & Domestic Energy Monitor</h1>
        
        <div class="tradingview-widget-container">
            <div class="tradingview-widget-container__widget"></div>
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
            {
              "colorTheme": "dark",
              "dateRange": "12M",
              "showChart": true,
              "locale": "it",
              "width": "100%",
              "height": "660",
              "largeChartUrl": "",
              "isTransparent": true,
              "showSymbolLogo": true,
              "showFloatingTooltip": true,
              "tabs": [
                {
                  "title": "Energy Mix",
                  "symbols": [
                    { "s": "ICEEUR:TTF1!", "d": "Gas Naturale (TTF)" },
                    { "s": "EEX:PSV1!", "d": "Gas Italia (PSV)" },
                    { "s": "EEX:ITB1!", "d": "Power Italia (PUN Proxy)" },
                    { "s": "EEX:DEB1!", "d": "Power Germania (EEX)" },
                    { "s": "ICEEUR:BRN1!", "d": "Petrolio Brent" },
                    { "s": "EEX:C021!", "d": "Quote CO2 (EUA)" },
                    { "s": "FX:EURUSD", "d": "Cambio Euro/Dollaro" }
                  ]
                }
              ]
            }
            </script>
        </div>
        </div>
</body>
</html>
