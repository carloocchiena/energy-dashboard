<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Market Dashboard | Real-Time Monitor</title>
    <style>
        /* Design scuro professionale orientato alla Data Science */
        body { 
            background-color: #0d1117; 
            margin: 0; 
            padding: 20px; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #e6edf3;
        }
        .container { 
            max-width: 1100px; 
            margin: auto; 
        }
        .header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 1px solid #30363d;
            margin-bottom: 30px;
        }
        h1 { font-size: 24px; font-weight: 500; color: #58a6ff; margin: 0; }
        p { color: #8b949e; font-size: 14px; margin-top: 8px; }
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #484f58;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Energy Market Hub</h1>
        <p>Monitoraggio Real-Time Componenti Energetiche & Commodities</p>
    </div>

    <div class="tradingview-widget-container">
        <div class="tradingview-widget-container__widget"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
        {
          "colorTheme": "dark",
          "dateRange": "12M",
          "showChart": true,
          "locale": "it",
          "width": "100%",
          "height": "600",
          "largeChartUrl": "",
          "isTransparent": true,
          "showSymbolLogo": true,
          "showFloatingTooltip": true,
          "tabs": [
            {
              "title": "Energy Mix",
              "symbols": [
                { "s": "ICEEUR:TTF1!", "d": "Gas Naturale (TTF)" },
                { "s": "EEX:PSV1!", "d": "Gas Italia (PSV)" },
                { "s": "EEX:ITB1!", "d": "Power Italia (PUN Proxy)" },
                { "s": "EEX:DEB1!", "d": "Power Germania (EEX)" },
                { "s": "ICEEUR:B1!", "d": "Petrolio Brent" },
                { "s": "EEX:C021!", "d": "Quote CO2 (EUA)" },
                { "s": "FX:EURUSD", "d": "Cambio EUR/USD" }
              ]
            }
          ]
        }
        </script>
    </div>
    <div class="footer">
        Dati forniti da TradingView via EEX e ICE. Aggiornamento in tempo reale o differito secondo le licenze di borsa.
    </div>
</div>

</body>
</html>
